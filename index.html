<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="くじ巡回">
<meta name="theme-color" content="#08080d">
<title>くじ巡回ノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080d;
    --bg2: #0e0e16;
    --bg3: #161622;
    --card: #111119;
    --card-hover: #17172a;
    --border: #22223a;
    --border-hi: #33335a;
    --accent: #00e8b8;
    --accent-glow: rgba(0,232,184,0.15);
    --accent2: #ff5a5a;
    --accent2-glow: rgba(255,90,90,0.12);
    --accent3: #ffcc00;
    --accent3-glow: rgba(255,204,0,0.12);
    --blue: #4d9fff;
    --purple: #b488ff;
    --text: #e4e4f0;
    --text2: #7e7e96;
    --text3: #4a4a60;
    --font: 'Zen Kaku Gothic New', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 2px 20px rgba(0,0,0,0.4);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100dvh;
    padding-bottom: calc(90px + var(--safe-b));
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ====== HEADER ====== */
  .header {
    background: linear-gradient(180deg, var(--bg2) 0%, rgba(14,14,22,0.92) 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 2px 12px rgba(0,232,184,0.25);
  }
  .logo-text {
    font-size: 17px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 60%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-sub {
    font-size: 9px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 1.5px;
    margin-top: -1px;
  }
  .header-stats {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .header-stats::-webkit-scrollbar { display: none; }
  .stat-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 10px;
    color: var(--text2);
    font-family: var(--mono);
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .stat-pill .val { color: var(--accent); font-weight: 700; font-size: 12px; }

  /* ====== MAIN ====== */
  .main { padding: 12px 14px; }

  /* ====== KUJI SELECTOR ====== */
  .kuji-selector {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
  }
  .kuji-selector-label {
    font-size: 9px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .kuji-select-row {
    display: flex; gap: 8px; align-items: center;
  }

  /* ====== FORMS ====== */
  select, input[type="text"], input[type="number"] {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  select:focus, input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  select option { background: var(--bg3); }

  /* ====== BUTTON ====== */
  .btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 9px 14px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 5px;
    user-select: none;
  }
  .btn:active { transform: scale(0.96); opacity: 0.85; }
  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .btn-accent:active { background: #00ccaa; }
  .btn-danger {
    background: transparent;
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }
  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text2);
  }

  /* ====== SECTION ====== */
  .section-title {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 16px 0 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ====== PRIZE SUMMARY BAR ====== */
  .prize-summary {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 0 6px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .prize-summary::-webkit-scrollbar { display: none; }
  .prize-summary-chip {
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    display: flex; align-items: center; gap: 5px;
    font-size: 11px;
    font-family: var(--mono);
  }
  .prize-summary-chip .ps-rank { font-weight: 700; }
  .prize-summary-chip .ps-count { font-weight: 700; }
  .prize-summary-chip.zero .ps-count { color: var(--text3); }
  .prize-summary-chip.last1 .ps-count { color: var(--accent2); }
  .prize-summary-chip.low .ps-count { color: #ff9f43; }
  .prize-summary-chip.mid .ps-count { color: var(--accent3); }
  .prize-summary-chip.high .ps-count { color: var(--accent); }

  /* ====== STORE CARD ====== */
  .store-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.25s, opacity 0.25s, box-shadow 0.25s;
    position: relative;
  }
  .store-card.has-stock {
    border-color: rgba(0,232,184,0.2);
    box-shadow: 0 0 20px rgba(0,232,184,0.04);
  }
  .store-card.no-stock { opacity: 0.45; }
  .store-card.old-data { border-color: rgba(255,90,90,0.2); }

  .store-header {
    padding: 12px 14px 6px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .store-info { flex: 1; min-width: 0; }
  .store-name-row {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
  }
  .store-name {
    font-size: 15px;
    font-weight: 900;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .store-type-badge {
    font-size: 9px;
    font-family: var(--mono);
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .badge-711 { background: rgba(255,90,90,0.15); color: #ff7070; }
  .badge-lw { background: rgba(77,159,255,0.15); color: var(--blue); }
  .badge-fm { background: rgba(0,232,184,0.15); color: var(--accent); }
  .badge-mm { background: rgba(255,204,0,0.15); color: var(--accent3); }
  .badge-other { background: rgba(126,126,150,0.15); color: var(--text2); }

  .store-meta {
    font-size: 11px;
    color: var(--text2);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .store-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .store-actions .btn-sm { padding: 4px 8px; font-size: 11px; }

  .store-status-row {
    padding: 2px 14px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }
  .time-tag { display: inline-flex; align-items: center; gap: 3px; }
  .time-tag.recent { color: var(--accent); }
  .time-tag.old { color: var(--accent2); }
  .remain-tag {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 1px 7px;
    border-radius: 8px;
    background: var(--bg3);
  }
  .remain-tag .rv { font-weight: 700; font-size: 12px; }
  .remain-tag .rv.zero { color: var(--text3); }
  .remain-tag .rv.last1 { color: var(--accent2); }
  .remain-tag .rv.low { color: #ff9f43; }
  .remain-tag .rv.mid { color: var(--accent3); }
  .remain-tag .rv.high { color: var(--accent); }

  /* ====== PRIZES GRID ====== */
  .prizes-section {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
  }
  .prizes-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .prize-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    transition: all 0.12s;
    min-width: 72px;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
  }
  .prize-chip:active { transform: scale(0.94); }
  .prize-chip.has-stock {
    border-color: rgba(0,232,184,0.3);
    background: rgba(0,232,184,0.04);
  }
  .prize-chip.no-stock { opacity: 0.35; }
  .prize-rank {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
  }
  .rank-A { color: #ffcc00; }
  .rank-B { color: #ff9f43; }
  .rank-C { color: var(--purple); }
  .rank-D { color: var(--text2); }
  .rank-E { color: var(--text3); }
  .rank-LAST, .rank-ラスト { color: var(--accent2); }
  .prize-count {
    font-size: 18px;
    font-weight: 900;
    font-family: var(--mono);
    line-height: 1;
  }
  .prize-count.zero { color: var(--text3); }
  .prize-count.last1 { color: var(--accent2); }
  .prize-count.low { color: #ff9f43; }
  .prize-count.mid { color: var(--accent3); }
  .prize-count.high { color: var(--accent); }
  .prize-unit { font-size: 9px; color: var(--text3); font-family: var(--mono); }

  /* tap hint ripple */
  .prize-chip .tap-hint {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .prize-chip.flash-plus .tap-hint { background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); opacity: 1; }
  .prize-chip.flash-minus .tap-hint { background: radial-gradient(circle, var(--accent2-glow) 0%, transparent 70%); opacity: 1; }

  /* ====== FAB ====== */
  .fab {
    position: fixed;
    bottom: calc(20px + var(--safe-b));
    right: 16px;
    z-index: 200;
    background: linear-gradient(135deg, var(--accent), #00b8d4);
    color: #000;
    border: none;
    border-radius: 16px;
    width: 54px; height: 54px;
    font-size: 26px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(0,232,184,0.35);
    transition: all 0.15s;
    font-family: var(--font);
    font-weight: 900;
  }
  .fab:active { transform: scale(0.9); }

  /* ====== MODAL ====== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 300;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 88dvh;
    overflow-y: auto;
    padding: 8px 18px 18px;
    padding-bottom: calc(18px + var(--safe-b));
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border-hi);
    border-radius: 2px;
    margin: 6px auto 14px;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 900;
    margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-close {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 50%;
    width: 28px; height: 28px;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ====== FORM ====== */
  .form-row { margin-bottom: 10px; }
  .form-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text2);
    letter-spacing: 1px;
    margin-bottom: 5px;
    display: block;
  }
  .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-hint {
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
  }

  /* ====== PRIZES EDITOR ====== */
  .prizes-editor { margin-top: 10px; }
  .prize-editor-row {
    display: flex; gap: 6px; align-items: center;
    margin-bottom: 6px;
  }
  .prize-editor-row .rank-input { width: 60px; flex-shrink: 0; text-align: center; font-weight: 700; }
  .remove-prize-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  /* ====== COUNT STEPPER ====== */
  .count-stepper {
    display: flex; align-items: center;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg3);
    flex-shrink: 0;
  }
  .count-stepper-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 18px;
    font-weight: 900;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
    user-select: none;
    font-family: var(--mono);
  }
  .count-stepper-btn:active { background: var(--accent-glow); }
  .count-stepper-btn.minus { color: var(--accent2); }
  .count-stepper-btn.minus:active { background: var(--accent2-glow); }
  .count-stepper .count-val {
    width: 42px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
    border: none;
    background: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 0;
    -moz-appearance: textfield;
  }
  .count-stepper .count-val::-webkit-inner-spin-button,
  .count-stepper .count-val::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  /* ====== CHAIN CHIPS ====== */
  .chain-chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .chain-chip input[type="checkbox"] { display: none; }
  .chip-body {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--bg3);
    color: var(--text3);
    transition: all 0.15s;
    user-select: none;
  }
  .chain-chip input:checked + .chip-711 { background: rgba(255,90,90,0.12); border-color: #ff7070; color: #ff7070; }
  .chain-chip input:checked + .chip-lw  { background: rgba(77,159,255,0.12); border-color: var(--blue); color: var(--blue); }
  .chain-chip input:checked + .chip-fm  { background: rgba(0,232,184,0.12); border-color: var(--accent); color: var(--accent); }
  .chain-chip input:checked + .chip-mm  { background: rgba(255,204,0,0.12); border-color: var(--accent3); color: var(--accent3); }
  .chain-chip input:checked + .chip-other { background: rgba(126,126,150,0.12); border-color: var(--text2); color: var(--text2); }

  /* ====== FILTER TABS ====== */
  .filter-tabs {
    display: flex;
    gap: 5px;
    margin-bottom: 2px;
    overflow-x: auto;
    padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text3);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: var(--font);
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .tab-btn .tab-count {
    font-family: var(--mono);
    font-size: 10px;
    margin-left: 2px;
    opacity: 0.7;
  }

  /* ====== EMPTY STATE ====== */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.6; }
  .empty-state .msg { font-size: 13px; line-height: 1.7; }

  /* ====== TOAST ====== */
  .toast {
    position: fixed;
    bottom: calc(84px + var(--safe-b));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--border-hi);
    border-radius: 12px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    z-index: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s ease;
    white-space: nowrap;
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 6px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.plus { border-color: var(--accent); }
  .toast.minus { border-color: var(--accent2); }

  /* ====== SETTINGS ====== */
  .settings-section {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .settings-section:last-child { border-bottom: none; }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0;
  }
  .settings-label { font-size: 13px; color: var(--text); }
  .settings-val { font-size: 12px; font-family: var(--mono); color: var(--text2); }
  .data-bar {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .data-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .data-bar-fill.warn { background: var(--accent3); }
  .data-bar-fill.danger { background: var(--accent2); }

  /* ====== BACKUP ====== */
  .backup-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .backup-card:last-child { margin-bottom: 0; }
  .backup-card.auto { border-left: 3px solid var(--blue); }
  .backup-card.manual { border-left: 3px solid var(--accent); }
  .backup-icon {

<script>
// ===== DATA =====
let data = { kujis: [], stores: [], currentKujiId: null };
let saveCount = 0; // auto-backup trigger counter
const AUTO_BACKUP_INTERVAL = 10; // auto-backup every N saves
const MAX_AUTO_BACKUPS = 3;
const MAX_MANUAL_BACKUPS = 5;
const BACKUP_REMIND_DAYS = 3;

function save() {
  const clean = {
    kujis: data.kujis,
    stores: data.stores.map(s => {
      const { _lastTap, _timer, ...rest } = s;
      return rest;
    }),
    currentKujiId: data.currentKujiId
  };
  localStorage.setItem('kuji-tracker', JSON.stringify(clean));

  // Auto-backup check
  saveCount++;
  if (saveCount >= AUTO_BACKUP_INTERVAL) {
    saveCount = 0;
    createAutoBackup();
  }
}

function load() {
  const raw = localStorage.getItem('kuji-tracker');
  if (raw) {
    try { data = JSON.parse(raw); } catch(e) {}
  }
  if (!data.kujis) data.kujis = [];
  if (!data.stores) data.stores = [];
  if (data.kujis.length === 0) {
    data.kujis.push({
      id: uid(),
      name: '鬼滅の刃 一番くじ',
      prizes: ['A','B','C','D','E'],
      chains: ['711','lw','fm']
    });
    save();
  }
  if (!data.currentKujiId && data.kujis.length > 0) {
    data.currentKujiId = data.kujis[0].id;
  }
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function sortedRanks(kuji, extraKeys) {
  const kujiOrder = kuji?.prizes || [];
  const extra = (extraKeys || []).filter(r => !kujiOrder.includes(r));
  extra.sort((a, b) => a.localeCompare(b, 'ja'));
  return [...kujiOrder, ...extra];
}

// ===== STATE =====
let editingStoreId = null;
let currentFilter = 'all';
let toastTimer = null;

// ===== TOAST =====
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 1400);
}

// ===== RENDER =====
function render() {
  renderKujiSelect();
  renderFilters();
  renderPrizeSummary();
  renderStores();
  renderStats();
  renderBackupBanner();
}

function renderKujiSelect() {
  const sel = document.getElementById('kuji-select');
  sel.innerHTML = '<option value="">-- くじを選択 --</option>';
  data.kujis.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k.id;
    opt.textContent = k.name;
    if (k.id === data.currentKujiId) opt.selected = true;
    sel.appendChild(opt);
  });
  const kuji = data.kujis.find(k => k.id === data.currentKujiId);
  document.getElementById('stat-kuji').textContent = kuji?.name || '-';
}

function getStoreStockStatus(store) {
  return Object.values(store.prizes || {}).reduce((a, b) => a + b, 0) > 0;
}

function isOldData(store) {
  if (!store.updatedAt) return false;
  return Date.now() - new Date(store.updatedAt).getTime() > 6 * 3600000;
}

function renderFilters() {
  const stores = data.stores.filter(s => s.kujiId === data.currentKujiId);
  const stockCount = stores.filter(s => getStoreStockStatus(s)).length;
  const noStockCount = stores.filter(s => !getStoreStockStatus(s)).length;
  const oldCount = stores.filter(s => isOldData(s)).length;

  const el = document.getElementById('filter-tabs');
  const filters = [
    ['all', 'すべて', stores.length],
    ['stock', '在庫あり', stockCount],
    ['nostock', '完売', noStockCount],
    ['old', '情報古い', oldCount]
  ];
  el.innerHTML = filters.map(([key, label, count]) =>
    `<button class="tab-btn ${currentFilter === key ? 'active' : ''}" onclick="setFilter('${key}', this)">${label}<span class="tab-count">${count}</span></button>`
  ).join('');
}

function renderPrizeSummary() {
  const el = document.getElementById('prize-summary');
  const kuji = data.kujis.find(k => k.id === data.currentKujiId);
  if (!kuji) { el.innerHTML = ''; return; }

  const stores = data.stores.filter(s => s.kujiId === data.currentKujiId);
  if (stores.length === 0) { el.innerHTML = ''; return; }

  const allRanks = sortedRanks(kuji, stores.flatMap(s => Object.keys(s.prizes || {})));
  el.innerHTML = allRanks.map(rank => {
    const total = stores.reduce((sum, s) => sum + ((s.prizes || {})[rank] || 0), 0);
    const storesHaving = stores.filter(s => ((s.prizes || {})[rank] || 0) > 0).length;
    let chipClass = 'zero';
    if (total >= 4) chipClass = 'high';
    else if (total === 3) chipClass = 'mid';
    else if (total === 2) chipClass = 'low';
    else if (total === 1) chipClass = 'last1';
    return `<div class="prize-summary-chip ${chipClass}">
      <span class="ps-rank rank-${rank}">${rank}賞</span>
      <span class="ps-count">${total}</span>
      <span style="color:var(--text3)">${storesHaving}店</span>
    </div>`;
  }).join('');
}

function renderStores() {
  const el = document.getElementById('stores-list');
  const kuji = data.kujis.find(k => k.id === data.currentKujiId);

  if (!kuji) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><div class="msg">くじを選択してください<br>「＋」ボタンでくじを追加</div></div>`;
    return;
  }

  let stores = data.stores.filter(s => s.kujiId === data.currentKujiId);

  if (currentFilter === 'stock') stores = stores.filter(s => getStoreStockStatus(s));
  if (currentFilter === 'nostock') stores = stores.filter(s => !getStoreStockStatus(s));
  if (currentFilter === 'old') stores = stores.filter(s => isOldData(s));

  if (stores.length === 0) {
    const msgs = {
      all: '店舗がまだありません<br>右下の「＋」ボタンで追加',
      stock: '在庫ありの店舗はありません',
      nostock: '完売の店舗はありません',
      old: '情報が古い店舗はありません'
    };
    el.innerHTML = `<div class="empty-state"><div class="icon">🏪</div><div class="msg">${msgs[currentFilter]}</div></div>`;
    return;
  }

  // ソート: 在庫あり→古い→完売
  stores.sort((a, b) => {
    const aScore = getStoreStockStatus(a) ? (isOldData(a) ? 1 : 2) : 0;
    const bScore = getStoreStockStatus(b) ? (isOldData(b) ? 1 : 2) : 0;
    return bScore - aScore;
  });

  const chainLabels = {
    '711': ['7-11', 'badge-711'],
    'lw': ['Lawson', 'badge-lw'],
    'fm': ['FamilyMart', 'badge-fm'],
    'mm': ['Ministop', 'badge-mm'],
    'other': ['Other', 'badge-other']
  };

  // 全賞を表示（くじ定義 + store独自賞をマージ）
  el.innerHTML = stores.map(store => {
    const hasStock = getStoreStockStatus(store);
    const old = isOldData(store);
    const [chainName, chainClass] = chainLabels[store.chain] || ['?', 'badge-other'];
    const timeStr = store.updatedAt ? formatTime(store.updatedAt) : '未確認';
    const timeClass = old ? 'old' : (store.updatedAt ? 'recent' : '');
    const cardClass = hasStock ? 'has-stock' : 'no-stock';
    const oldClass = old ? 'old-data' : '';

    const allRanks = sortedRanks(kuji, Object.keys(store.prizes || {}));
    const prizesHtml = allRanks.map(rank => {
      const count = (store.prizes || {})[rank] || 0;
      let countClass = 'zero';
      if (count >= 4) countClass = 'high';
      else if (count === 3) countClass = 'mid';
      else if (count === 2) countClass = 'low';
      else if (count === 1) countClass = 'last1';
      const chipClass = count > 0 ? 'has-stock' : 'no-stock';
      return `<div class="prize-chip ${chipClass}" ontouchstart="chipTouchStart('${store.id}','${rank}',event)" ontouchend="chipTouchEnd('${store.id}','${rank}',event)" onclick="chipClick('${store.id}','${rank}',event)">
        <div class="tap-hint"></div>
        <span class="prize-rank rank-${rank}">${rank}賞</span>
        <div>
          <div class="prize-count ${countClass}">${count}</div>
          <div class="prize-unit">枚</div>
        </div>
      </div>`;
    }).join('');

    const remaining = store.remaining || 0;
    let remainClass = 'zero';
    if (remaining >= 10) remainClass = 'high';
    else if (remaining >= 4) remainClass = 'mid';
    else if (remaining >= 2) remainClass = 'low';
    else if (remaining === 1) remainClass = 'last1';

    return `<div class="store-card ${cardClass} ${oldClass}" id="store-${store.id}">
      <div class="store-header">
        <div class="store-info">
          <div class="store-name-row">
            <span class="store-name">${escHtml(store.name)}</span>
            <span class="store-type-badge ${chainClass}">${chainName}</span>
          </div>
          ${store.area || store.memo ? `<div class="store-meta">📍 ${escHtml(store.area || '')}${store.area && store.memo ? ' · ' : ''}${escHtml(store.memo || '')}</div>` : ''}
        </div>
        <div class="store-actions">
          <button class="btn btn-sm" onclick="editStore('${store.id}')">✏️</button>
          <button class="btn btn-sm btn-danger" onclick="deleteStore('${store.id}')">🗑</button>
        </div>
      </div>
      <div class="store-status-row">
        <span class="time-tag ${timeClass}">🕐 ${timeStr}</span>
        <span class="remain-tag">🎫 残 <span class="rv ${remainClass}">${remaining}</span></span>
      </div>
      <div class="prizes-section">
        <div class="prizes-grid">${prizesHtml}</div>
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  const stores = data.stores.filter(s => s.kujiId === data.currentKujiId);
  document.getElementById('stat-stores').textContent = stores.length;
  document.getElementById('stat-stocked').textContent = stores.filter(s => getStoreStockStatus(s)).length;
}

function formatTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'たった今';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分前';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '時間前';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== CHIP TAP (タップ=+1, 長押し=-1) =====
const chipTimers = {};

function chipTouchStart(storeId, rank, ev) {
  const key = storeId + rank;
  chipTimers[key] = { time: Date.now(), held: false };
  chipTimers[key].timer = setTimeout(() => {
    chipTimers[key].held = true;
    updatePrizeCount(storeId, rank, -1, ev);
  }, 500);
}

function chipTouchEnd(storeId, rank, ev) {
  const key = storeId + rank;
  const info = chipTimers[key];
  if (info) {
    clearTimeout(info.timer);
    if (!info.held) {
      ev.preventDefault();
      updatePrizeCount(storeId, rank, 1, ev);
    }
  }
  delete chipTimers[key];
}

function chipClick(storeId, rank, ev) {
  // Desktop fallback (no touch events)
  if (!('ontouchstart' in window)) {
    updatePrizeCount(storeId, rank, 1, ev);
  }
}

function updatePrizeCount(storeId, rank, delta, ev) {
  const store = data.stores.find(s => s.id === storeId);
  if (!store) return;
  if (!store.prizes) store.prizes = {};
  const current = store.prizes[rank] || 0;
  const newVal = Math.max(0, current + delta);
  if (newVal === current && delta < 0) return;
  store.prizes[rank] = newVal;
  store.updatedAt = new Date().toISOString();
  save();

  // Visual feedback
  const chip = ev?.currentTarget || ev?.target?.closest?.('.prize-chip');
  if (chip) {
    chip.classList.remove('flash-plus', 'flash-minus');
    void chip.offsetWidth;
    chip.classList.add(delta > 0 ? 'flash-plus' : 'flash-minus');
    setTimeout(() => chip.classList.remove('flash-plus', 'flash-minus'), 300);
  }

  showToast(`${rank}賞 → ${newVal}枚`, delta > 0 ? 'plus' : 'minus');
  render();
}

let prizeRows = [];
let nameMode = 'new';

function openAddStore() {

    return;
  }

function updateChainOptions(kujiChains) {
  const all = { '711': 'セブン-イレブン', 'lw': 'ローソン', 'fm': 'ファミマ', 'mm': 'ミニストップ', 'other': 'その他' };
  const sel = document.getElementById('f-chain');
  sel.innerHTML = '';

  chains.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = all[c] || c;
    sel.appendChild(opt);
  });
}

function onChainChange() {
  updateStoreNameDropdown(document.getElementById('f-chain').value);
}

function updateStoreNameDropdown(chain) {
  const sel = document.getElementById('f-name-select');
  const inp = document.getElementById('f-name');
  const btn = document.getElementById('f-name-toggle');

  const names = [...new Set(data.stores.filter(s => s.chain === chain).map(s => s.name))].sort();
  sel.innerHTML = '<option value="">-- 登録済みから選択 --</option>';
  names.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n;
    opt.textContent = n;
    sel.appendChild(opt);
  });

  if (names.length > 0) {
    nameMode = 'select';
    sel.style.display = '';
    inp.style.display = 'none';
    inp.value = '';
    btn.textContent = '📝 新規入力に切替';
    btn.style.display = '';
  } else {
    nameMode = 'new';
    sel.style.display = 'none';
    inp.style.display = '';
    inp.value = '';
    btn.style.display = 'none';
  }
}

function toggleNameMode() {
  const sel = document.getElementById('f-name-select');
  const inp = document.getElementById('f-name');
  const btn = document.getElementById('f-name-toggle');
  if (nameMode === 'select') {
    nameMode = 'new';
    sel.style.display = 'none';
    inp.style.display = '';
    inp.value = '';
    btn.textContent = '📋 登録済みから選択';
  } else {
    nameMode = 'select';
    sel.style.display = '';
    inp.style.display = 'none';
    inp.value = '';
    btn.textContent = '📝 新規入力に切替';
  }
}

function getStoreName() {
  return nameMode === 'select'
    ? document.getElementById('f-name-select').value.trim()
    : document.getElementById('f-name').value.trim();
}

function setStoreName(name, chain) {
  const names = [...new Set(data.stores.filter(s => s.chain === chain).map(s => s.name))];
  if (names.includes(name)) {
    nameMode = 'select';
    document.getElementById('f-name-select').style.display = '';
    document.getElementById('f-name').style.display = 'none';
    document.getElementById('f-name-select').value = name;
    document.getElementById('f-name-toggle').textContent = '📝 新規入力に切替';
    document.getElementById('f-name-toggle').style.display = '';
  } else {
    nameMode = 'new';
    document.getElementById('f-name-select').style.display = 'none';
    document.getElementById('f-name').style.display = '';
    document.getElementById('f-name').value = name;
    document.getElementById('f-name-toggle').textContent = '📋 登録済みから選択';
    document.getElementById('f-name-toggle').style.display = names.length > 0 ? '' : 'none';
  }
}

function onStoreNameSelect() {
  const name = document.getElementById('f-name-select').value;
  const chain = document.getElementById('f-chain').value;
  if (!name) return;
  const match = data.stores.find(s => s.chain === chain && s.name === name);
  if (match) {
    const a = document.getElementById('f-area');
    const m = document.getElementById('f-memo');
    if (!a.value && match.area) a.value = match.area;
    if (!m.value && match.memo) m.value = match.memo;
  }
}

function stepRemaining(delta) {
  const el = document.getElementById('f-remaining');
  el.value = Math.max(0, (parseInt(el.value) || 0) + delta);
}

function editStore(id) {
  const store = data.stores.find(s => s.id === id);
  if (!store) return;
  editingStoreId = id;
  document.getElementById('modal-store-title').textContent = '店舗を編集';
  document.getElementById('f-area').value = store.area || '';
  document.getElementById('f-memo').value = store.memo || '';
  document.getElementById('f-remaining').value = store.remaining || 0;

  const kuji = data.kujis.find(k => k.id === data.currentKujiId);
  updateChainOptions(kuji?.chains);
  document.getElementById('f-chain').value = store.chain || '711';
  updateStoreNameDropdown(store.chain || '711');
  setStoreName(store.name, store.chain || '711');

  const prizes = store.prizes || {};
  const allRanks = sortedRanks(kuji, Object.keys(prizes));
  prizeRows = allRanks.map(r => ({ rank: r, count: prizes[r] || 0 }));
  renderPrizeEditor();
  openModal('modal-store');
}

function renderPrizeEditor() {
  document.getElementById('prize-editor-rows').innerHTML = prizeRows.map((p, i) => `
    <div class="prize-editor-row">
      <input class="rank-input" type="text" value="${escHtml(p.rank)}" placeholder="賞" oninput="prizeRows[${i}].rank=this.value">
      <div class="count-stepper">
        <button type="button" class="count-stepper-btn minus" onclick="stepCount(${i},-1)">−</button>
        <input class="count-val" type="number" min="0" value="${p.count}" oninput="prizeRows[${i}].count=Math.max(0,parseInt(this.value)||0)">
        <button type="button" class="count-stepper-btn" onclick="stepCount(${i},1)">＋</button>
      </div>
      <button class="remove-prize-btn" onclick="removePrizeRow(${i})">×</button>
    </div>
  `).join('');
}

function stepCount(i, delta) {
  prizeRows[i].count = Math.max(0, prizeRows[i].count + delta);
  renderPrizeEditor();
}

function addPrizeRow() {
  const used = prizeRows.map(p => p.rank.toUpperCase());
  let next = '';
  for (let i = 0; i < 26; i++) {
    const l = String.fromCharCode(65 + i);
    if (!used.includes(l)) { next = l; break; }
  }
  prizeRows.push({ rank: next, count: 0 });
  renderPrizeEditor();
}

function removePrizeRow(i) {
  prizeRows.splice(i, 1);
  renderPrizeEditor();
}

function saveStore() {
  const name = getStoreName();
  if (!name) { showToast('店名を入力してください', ''); return; }
  if (!data.currentKujiId) { showToast('くじを選択してください', ''); return; }

  const prizes = {};
  const dupes = [];
  prizeRows.forEach(p => {
    if (!p.rank) return;
    if (prizes.hasOwnProperty(p.rank)) {
      dupes.push(p.rank);
      prizes[p.rank] += p.count;
    } else {
      prizes[p.rank] = p.count;
    }
  });
  if (dupes.length > 0) {
    showToast(`${dupes.join(',')}賞が重複 → 合算しました`, '');
  }

  if (editingStoreId) {
    const store = data.stores.find(s => s.id === editingStoreId);
    if (store) {
      store.name = name;
      store.chain = document.getElementById('f-chain').value;
      store.area = document.getElementById('f-area').value.trim();
      store.memo = document.getElementById('f-memo').value.trim();
      store.remaining = parseInt(document.getElementById('f-remaining').value) || 0;
      store.prizes = prizes;
      store.updatedAt = new Date().toISOString();
    }
  } else {
    data.stores.push({
      id: uid(),
      kujiId: data.currentKujiId,
      name,
      chain: document.getElementById('f-chain').value,
      area: document.getElementById('f-area').value.trim(),
      memo: document.getElementById('f-memo').value.trim(),
      remaining: parseInt(document.getElementById('f-remaining').value) || 0,
      prizes,
      updatedAt: new Date().toISOString()
    });
  }
  save();
  closeModal('modal-store');
  showToast(editingStoreId ? '更新しました' : '追加しました', 'plus');
  render();
}

function deleteStore(id) {
  if (!confirm('この店舗を削除しますか？')) return;
  data.stores = data.stores.filter(s => s.id !== id);
  save();
  showToast('削除しました', 'minus');
  render();
}

function renderDataSize() {
  const mainRaw = localStorage.getItem('kuji-tracker') || '';
  const backupRaw = localStorage.getItem('kuji-tracker-backups') || '';

  const backupKb = (new Blob([backupRaw]).size / 1024).toFixed(1);
  const totalKb = (totalBytes / 1024).toFixed(1);
  const pct = Math.min(100, (totalBytes / (5 * 1024 * 1024)) * 100);
  document.getElementById('data-size').textContent = `${totalKb} KB（本体 ${mainKb} / バックアップ ${backupKb}）`;
  const bar = document.getElementById('data-bar-fill');
  bar.style.width = Math.max(1, pct) + '%';
  bar.className = 'data-bar-fill' + (pct > 80 ? ' danger' : pct > 50 ? ' warn' : '');
}

  if (data.stores.length > 0 || data.kujis.length > 0) {

  data = { kujis: [], stores: [], currentKujiId: null };
  save();
  load();
  closeModal('modal-settings');

      localStorage.removeItem('kuji-tracker-backups');
      localStorage.removeItem('kuji-tracker-last-backup');
      showToast('バックアップも削除しました', 'minus');
    }
  }, 300);
}

// ===== BACKUP SYSTEM =====
function getBackups() {
  const raw = localStorage.getItem('kuji-tracker-backups');
  if (!raw) return [];
  try { return JSON.parse(raw); } catch(e) { return []; }
}

function saveBackups(backups) {
  localStorage.setItem('kuji-tracker-backups', JSON.stringify(backups));
}

function createBackupSnapshot(type, label) {
  const clean = {
    kujis: data.kujis,
    stores: data.stores.map(s => {
      const { _lastTap, _timer, ...rest } = s;
      return rest;
    }),
    currentKujiId: data.currentKujiId
  };
  return {
    id: uid(),
    type, // 'auto' | 'manual'
    label,
    createdAt: new Date().toISOString(),
    kujiCount: data.kujis.length,
    storeCount: data.stores.length,
    data: JSON.stringify(clean)
  };
}

function createAutoBackup() {
  if (data.stores.length === 0 && data.kujis.length <= 1) return; // skip if nearly empty
  const backups = getBackups();
  const autoBackups = backups.filter(b => b.type === 'auto');
  // Keep only the latest N-1 auto backups (about to add 1 more)
  while (autoBackups.length >= MAX_AUTO_BACKUPS) {
    const oldest = autoBackups.shift();
    const idx = backups.findIndex(b => b.id === oldest.id);
    if (idx >= 0) backups.splice(idx, 1);
  }
  backups.push(createBackupSnapshot('auto', '自動バックアップ'));
  saveBackups(backups);
}

function createManualBackup() {
  const backups = getBackups();
  const manualBackups = backups.filter(b => b.type === 'manual');
  if (manualBackups.length >= MAX_MANUAL_BACKUPS) {
    const oldest = manualBackups[0];
    const idx = backups.findIndex(b => b.id === oldest.id);
    if (idx >= 0) backups.splice(idx, 1);
  }
  const d = new Date();
  const label = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} 手動保存`;
  backups.push(createBackupSnapshot('manual', label));
  saveBackups(backups);

  // Record last manual backup time
  localStorage.setItem('kuji-tracker-last-backup', new Date().toISOString());

  showToast('バックアップを保存しました', 'plus');
  renderBackupList();
  renderDataSize();
  renderBackupBanner();
}

function restoreBackup(backupId) {
  const backups = getBackups();
  const backup = backups.find(b => b.id === backupId);
  if (!backup) { showToast('バックアップが見つかりません', 'minus'); return; }

  const parsed = JSON.parse(backup.data);
  const msg = `この復元ポイントに戻しますか？\n\n` +
    `📅 ${formatTimeAbs(backup.createdAt)}\n` +
    `📦 くじ ${backup.kujiCount}件 / 店舗 ${backup.storeCount}件\n\n` +
    `※ 現在のデータは上書きされます`;
  if (!confirm(msg)) return;

  // Auto-backup current state before restoring
  const currentBackups = getBackups();
  const d = new Date();
  const safeLabel = `復元前の自動保存 ${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  currentBackups.push(createBackupSnapshot('auto', safeLabel));
  // Trim auto backups
  const autos = currentBackups.filter(b => b.type === 'auto');
  while (autos.length > MAX_AUTO_BACKUPS + 1) {
    const oldest = autos.shift();
    const idx = currentBackups.findIndex(b => b.id === oldest.id);
    if (idx >= 0) currentBackups.splice(idx, 1);
  }
  saveBackups(currentBackups);

  data = parsed;
  save();
  showToast('復元しました', 'plus');
  render();
  renderBackupList();
  renderDataSize();
}

function deleteBackup(backupId) {
  if (!confirm('このバックアップを削除しますか？')) return;
  const backups = getBackups().filter(b => b.id !== backupId);
  saveBackups(backups);
  showToast('バックアップを削除しました', 'minus');
  renderBackupList();
  renderDataSize();
}

function renderBackupList() {
  const el = document.getElementById('backup-list');
  if (!el) return;
  const backups = getBackups().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  if (backups.length === 0) {
    el.innerHTML = '<div class="backup-empty">💾 バックアップはまだありません<br>「今すぐ保存」で復元ポイントを作成</div>';
    return;
  }

  el.innerHTML = backups.map(b => {
    const isAuto = b.type === 'auto';
    return `<div class="backup-card ${b.type}">
      <div class="backup-icon ${b.type}">${isAuto ? '🔄' : '💾'}</div>
      <div class="backup-info">
        <div class="backup-title">${escHtml(b.label)}</div>
        <div class="backup-meta">${formatTimeAbs(b.createdAt)} · くじ${b.kujiCount} 店舗${b.storeCount}</div>
      </div>
      <div class="backup-actions">
        <button class="btn btn-sm" onclick="restoreBackup('${b.id}')" title="復元">↩️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteBackup('${b.id}')" title="削除" style="padding:4px 6px;font-size:10px;">×</button>
      </div>
    </div>`;
  }).join('');
}

function renderBackupBanner() {
  const el = document.getElementById('backup-banner');
  if (!el) return;

  // Show if no manual backup in N days and there's data worth backing up
  if (data.stores.length < 2) { el.innerHTML = ''; return; }

  const lastBackup = localStorage.getItem('kuji-tracker-last-backup');
  const daysSince = lastBackup
    ? (Date.now() - new Date(lastBackup).getTime()) / 86400000
    : Infinity;

  if (daysSince < BACKUP_REMIND_DAYS) { el.innerHTML = ''; return; }

  const msg = lastBackup
    ? `前回の手動バックアップから <strong>${Math.floor(daysSince)}日</strong> 経過`
    : '<strong>まだバックアップを取っていません</strong>';

  el.innerHTML = `<div class="backup-banner">
    <span class="bb-icon">⚠️</span>
    <div class="bb-text">${msg}<br>データ消失に備えて保存しましょう</div>
    <button class="btn btn-sm btn-accent" onclick="quickBackup()">💾 保存</button>
  </div>`;
}

function quickBackup() {
  createManualBackup();
  document.getElementById('backup-banner').innerHTML = '';
}

function formatTimeAbs(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ===== EXPORT / IMPORT =====
function exportData() {
  const exportObj = {
    version: 2,
    exportedAt: new Date().toISOString(),
    data: {
      kujis: data.kujis,
      stores: data.stores.map(s => {
        const { _lastTap, _timer, ...rest } = s;
        return rest;
      }),
      currentKujiId: data.currentKujiId
    }
  };
  const json = JSON.stringify(exportObj, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kuji-tracker-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('エクスポート完了', 'plus');
}

function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const raw = JSON.parse(e.target.result);

      // Support both v1 (flat) and v2 (wrapped) format
      let imported;
      if (raw.version === 2 && raw.data) {
        imported = raw.data;
      } else if (raw.kujis && raw.stores) {
        imported = raw;
      } else {
        showToast('無効なデータ形式です', 'minus');
        return;
      }

      if (!confirm(`インポートすると現在のデータが上書きされます。\nくじ ${imported.kujis.length}件、店舗 ${imported.stores.length}件\n\n※ 現在のデータは自動バックアップされます\n実行しますか？`)) return;

      // Auto-backup before import
      createAutoBackup();

      data = imported;
      save();
      render();
      showToast('インポート完了', 'plus');
    } catch(err) {
      showToast('ファイルを読み込めません', 'minus');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

// ===== BOOT =====
load();
render();
</script>
</body>
</html>
